const mealVariants={
lunch:{text:"【突發事件】接近中午，主管突然宣布請吃午餐，而且沒有附帶『邊吃邊開會』。整個團隊立刻展現出比 Sprint Planning 更高的決策效率。",options:[{text:"健康便當，下午穩定輸出",resume:true,minutes:35,energy:18,stress:-10,effect:"精力 +18、壓力 -10"},{text:"去熱炒店，和團隊認真補充能量",resume:true,minutes:60,energy:25,stress:-12,effect:"精力 +25、壓力 -12、時間 +60"},{text:"快速飯糰，吃完繼續處理工作",resume:true,minutes:20,energy:10,stress:-4,effect:"精力 +10"}]},
snack:{text:"【突發事件】下午，主管在飲料之外加碼請大家吃點心。這次食物接龍的討論熱度，成功超越早上的系統架構議題。",options:[{text:"炸雞排，補充高效能算力",resume:true,minutes:20,energy:20,stress:5,effect:"精力 +20、壓力 +5"},{text:"蔥油餅，邊吃邊整理思緒",resume:true,minutes:16,energy:13,stress:-8,effect:"精力 +13、壓力 -8"},{text:"披薩，和團隊一起分享",resume:true,minutes:28,energy:17,stress:-15,effect:"精力 +17、壓力 -15"}]}
};
const RANDOM_AFTER=new Set(["arrival","standup","debug","feature","meeting","drink","review"]);
const WORK_SCENES=new Set(["standup","debug","feature","meeting","review"]);
let state,history=[],typingTimer=null,finishTyping=null,showHints=false;
function initialState(){return{node:"start",clock:440,workStart:null,energy:72,stress:18,bugs:0,features:0,debt:0,trust:50,over:false,randomTriggered:[],pendingNext:null,lastEnding:null}}
function timeText(minutes){const h=Math.floor(minutes/60)%24,m=minutes%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`}
function workHours(){if(state.workStart===null)return 0;return Math.max(0,(state.clock-state.workStart)/60)}
function renderStatus(){$("#status").innerHTML=`<span class="metric">時間 <b>${timeText(state.clock)}</b></span><span class="metric">工時 <b>${workHours().toFixed(1)}h</b></span><span class="metric">精力 <b>${state.energy}</b></span><span class="metric">壓力 <b>${state.stress}</b></span><span class="metric">Bug <b>${state.bugs}</b></span><span class="metric">需求 <b>${state.features}</b></span><span class="metric">技術債 <b>${state.debt}</b></span><span class="metric">信任 <b>${state.trust}</b></span>`}
function escapeHtml(v){const d=document.createElement("div");d.textContent=String(v);return d.innerHTML}function scrollBottom(){const f=$("#flow");f.scrollTop=f.scrollHeight}
function getScene(id){if(id==="eventMeal")return state.clock<720?mealVariants.lunch:mealVariants.snack;return scenes[id]||randomEvents[id]}
function addMessage(who,text,record=true){const el=document.createElement("div");el.className="msg "+who;const avatar=who==="gm"?"🧑‍💼":who==="player"?"🧑‍💻":"";el.innerHTML=(avatar?`<span class="avatar" aria-hidden="true">${avatar}</span>`:"")+"<div class=\"bubble\"></div>";el.querySelector(".bubble").textContent=text;$("#flow").append(el);scrollBottom();if(record)history.push({who,text});return el}
function typeMessage(el,text,done){if(matchMedia("(prefers-reduced-motion:reduce)").matches){el.querySelector(".bubble").textContent=text;done();return}const b=el.querySelector(".bubble");let i=0;b.textContent="";finishTyping=()=>{clearInterval(typingTimer);typingTimer=null;b.textContent=text;finishTyping=null;done()};typingTimer=setInterval(()=>{i+=2;b.textContent=text.slice(0,i);scrollBottom();if(i>=text.length)finishTyping()},22)}
function renderOptions(scene){const box=$("#options");box.innerHTML="";scene.options.forEach(o=>{const b=document.createElement("button");b.className="option";b.innerHTML=escapeHtml(o.text)+(showHints&&o.effect?`<span class="effect">（${escapeHtml(o.effect)}）</span>`:"");b.onclick=()=>choose(o);box.append(b)});requestAnimationFrame(scrollBottom)}
function syncHintButton(){const b=$("#hintBtn");b.textContent=`提示：${showHints?"開":"關"}`;b.setAttribute("aria-pressed",String(showHints))}
function toggleHints(){showHints=!showHints;try{localStorage.setItem(HINT_KEY,showHints?"on":"off")}catch(e){}syncHintButton();const scene=state&&getScene(state.node);if(scene&&!state.over&&!scene.ending)renderOptions(scene)}
function initHints(){try{showHints=localStorage.getItem(HINT_KEY)==="on"}catch(e){showHints=false}syncHintButton()}
function apply(option){state.clock+=option.minutes||0;state.energy=Math.max(0,Math.min(MAX_ENERGY,state.energy+(option.energy||0)));state.stress=Math.max(0,Math.min(MAX_STRESS,state.stress+(option.stress||0)));state.bugs+=option.bugs||0;state.features+=option.features||0;state.debt=Math.max(0,Math.min(10,state.debt+(option.debt||0)));state.trust=Math.max(0,Math.min(100,state.trust+(option.trust||0)));if(option.next==="arrival"&&state.workStart===null)state.workStart=state.clock}
function resolveWorkOutcome(from,option){
  if(!WORK_SCENES.has(from)||(!option.bugs&&!option.features))return;
  let chance=.70+(state.energy>=70?.10:state.energy<=25?-.20:0)+(state.stress<=30?.10:state.stress>=70?-.20:0)-(state.debt>=7?.20:state.debt>=4?.10:0);
  chance=Math.max(.15,Math.min(.95,chance));const roll=Math.random();let result="成功完成";
  if(roll<chance*.22){state.clock=Math.max(state.workStart||0,state.clock-15);if(option.bugs)state.bugs++;else state.features++;result="進入心流：完美完成，額外取得成果並節省 15 分鐘"}
  else if(roll>chance){if(state.trust>=70&&Math.random()<.25){state.stress=Math.min(100,state.stress+5);result="團隊支援：原本的失誤被同事及時接住"}else{state.bugs=Math.max(0,state.bugs-(option.bugs||0));state.features=Math.max(0,state.features-(option.features||0));state.clock+=30;state.stress=Math.min(100,state.stress+12);state.debt=Math.min(10,state.debt+1);result="處理失敗：成果未完成，時間 +30、壓力 +12、技術債 +1"}}
  else if(roll>chance*.82){state.stress=Math.min(100,state.stress+6);state.debt=Math.min(10,state.debt+1);result="勉強完成：成果保留，壓力 +6、技術債 +1"}
  addMessage("system",result);
}
function finishDay(mode){let id;if(mode==="checked")id=state.debt>=7||state.stress>=75?"debtCrash":"success";else if(mode==="defer")id=state.trust>=60&&state.bugs+state.features>=3?"balanced":"delay";else if(mode==="risky"){if(state.energy>=55&&state.stress<=55&&state.debt<=3)id="lucky";else{go("incident");return}}else id=state.trust>=70?"rollback":"overtime";go(id)}
function maybeRandomEvent(from,next){if(!RANDOM_AFTER.has(from)||scenes[next].ending||state.randomTriggered.length>=3||Math.random()>=0.45)return false;const available=Object.keys(randomEvents).filter(id=>!state.randomTriggered.includes(id));if(!available.length)return false;const id=available[Math.floor(Math.random()*available.length)];state.randomTriggered.push(id);state.pendingNext=next;addMessage("system",`突發事件 ${state.randomTriggered.length} / 3`);go(id);return true}
function choose(option){if(state.over)return;document.querySelectorAll(".option").forEach(b=>b.disabled=true);const from=state.node;addMessage("player",option.text);apply(option);resolveWorkOutcome(from,option);if(option.minutes||option.energy||option.stress||option.bugs||option.features||option.debt||option.trust){const bits=[];if(option.minutes)bits.push(`時間 +${option.minutes} 分`);if(option.bugs)bits.push(`Bug +${option.bugs}`);if(option.features)bits.push(`需求 +${option.features}`);if(option.energy)bits.push(`精力 ${option.energy>0?"+":""}${option.energy}`);if(option.stress)bits.push(`壓力 ${option.stress>0?"+":""}${option.stress}`);if(option.debt)bits.push(`技術債 ${option.debt>0?"+":""}${option.debt}`);if(option.trust)bits.push(`信任 ${option.trust>0?"+":""}${option.trust}`);addMessage("system",bits.join("｜"))}renderStatus();if(state.energy<=0||state.stress>=100){go("exhausted");return}if(option.finish){finishDay(option.finish);return}if(option.resume){const next=state.pendingNext;state.pendingNext=null;go(next);return}if(maybeRandomEvent(from,option.next))return;go(option.next)}
function go(id,instant=false){state.node=id;const scene=getScene(id);if(scene.ending){state.lastEnding=id;showEnding(scene.ending,id);return}const show=()=>{const el=addMessage("gm",scene.text);if(instant)renderOptions(scene);else{el.querySelector(".bubble").textContent="";typeMessage(el,scene.text,()=>renderOptions(scene))}renderStatus()};$("#options").innerHTML="";if(instant){show();return}$("#thinking").classList.add("on");setTimeout(()=>{$("#thinking").classList.remove("on");show()},380)}
function rating(){if(state.debt<=2&&state.trust>=70)return"兼顧品質與合作的資深工程師";if(state.bugs>=6)return"今日除錯王";if(state.features>=3)return"需求推進器";if(workHours()>10)return"需要被強制下線的加班勇者";return"在混亂中持續學習的工程師"}
function endingReasons(id){const common=`技術債 ${state.debt}、團隊信任 ${state.trust}、成果 ${state.bugs+state.features} 項`;const map={success:`完整檢查，加上可控的技術債與壓力。${common}`,debtCrash:`技術債或壓力超出安全範圍。${common}`,balanced:`團隊信任與今日成果足以支持延後部署。${common}`,delay:`今日成果或團隊信任不足以支撐延後。${common}`,lucky:`精力充足、壓力與技術債偏低，讓高風險部署過關。${common}`,rollback:`團隊信任達到支援門檻，事故被共同接住。${common}`,overtime:`團隊信任不足，事故只能獨自處理。${common}`,exhausted:`精力歸零或壓力達到極限。${common}`};return map[id]||common}
function calculateScore(id){const endingBonus={success:10,balanced:10,lucky:5,rollback:5,debtCrash:0,delay:0,overtime:-5,exhausted:-5};const raw=state.bugs*6+state.features*10+state.trust*.2+state.energy*.1-state.stress*.15-state.debt*5-Math.max(0,workHours()-8)*3+(endingBonus[id]||0);return Math.max(0,Math.min(100,Math.round(raw)))}
function scoreGrade(score){return score>=90?"S":score>=80?"A":score>=70?"B":score>=60?"C":"D"}
function showEnding(e,id){state.over=true;$("#options").innerHTML="";const hours=workHours(),score=calculateScore(id),grade=scoreGrade(score);$("#endingCard").innerHTML=`<div class="big">${e.icon}</div><h2 id="endingTitle">${escapeHtml(e.title)}</h2><div class="story">${escapeHtml(e.text)}</div><div class="summary"><div class="sum"><b>${hours.toFixed(1)}h</b><span>今日工時</span></div><div class="sum"><b>${state.bugs}</b><span>解決 Bug</span></div><div class="sum"><b>${state.features}</b><span>完成需求</span></div><div class="sum"><b>${state.debt}</b><span>技術債</span></div><div class="sum"><b>${state.trust}</b><span>團隊信任</span></div><div class="sum"><b>${state.energy}</b><span>剩餘精力</span></div><div class="sum"><b>${state.stress}</b><span>最終壓力</span></div><div class="sum"><b>${score} / ${grade}</b><span>今日總分</span></div></div><div class="reasons"><b>關鍵原因：</b>${escapeHtml(endingReasons(id))}</div><div class="rating">今日評語：${rating()}</div><button class="again" id="againBtn">再上一次班</button>`;$("#ending").classList.add("on");$("#againBtn").onclick=()=>restart(false);$("#againBtn").focus()}
function system(text){addMessage("system",text)}function validSave(d){return d&&d.version===3&&d.state&&(scenes[d.state.node]||randomEvents[d.state.node])&&Number.isInteger(d.state.clock)&&Number.isInteger(d.state.debt)&&Number.isInteger(d.state.trust)&&Array.isArray(d.state.randomTriggered)&&d.state.randomTriggered.length<=3&&Array.isArray(d.history)&&d.history.every(m=>m&&["gm","player","system"].includes(m.who)&&typeof m.text==="string")}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({version:3,state,history}));system("今日進度已儲存。") }catch(e){system("瀏覽器不允許儲存，但仍可繼續遊玩。")}}
function load(){try{const raw=localStorage.getItem(SAVE_KEY);if(!raw){system("目前沒有存檔。");return}const data=JSON.parse(raw);if(!validSave(data))throw Error("invalid");state=data.state;history=[];$("#flow").innerHTML="";data.history.forEach(m=>addMessage(m.who,m.text));$("#ending").classList.remove("on");renderStatus();const scene=getScene(state.node);if(scene.ending)showEnding(scene.ending,state.node);else{state.over=false;renderOptions(scene)}system("已讀取今日進度。") }catch(e){system("存檔損壞或版本不相容，無法讀取。")}}
function restart(ask=true){if(ask&&!confirm("確定要重新開始這個工作日嗎？"))return;if(typingTimer)clearInterval(typingTimer);typingTimer=null;finishTyping=null;state=initialState();history=[];$("#flow").innerHTML="";$("#ending").classList.remove("on");renderStatus();system("新的一天開始了。願你的部署一次成功。");go("start")}
$("#hintBtn").onclick=toggleHints;$("#saveBtn").onclick=save;$("#loadBtn").onclick=load;$("#restartBtn").onclick=()=>restart(true);$("#flow").onclick=()=>{if(finishTyping)finishTyping()};initHints();restart(false);
</script>
</body></html>
